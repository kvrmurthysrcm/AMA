- name: get_dashboard_summary
  title: Get Dashboard Summary
  description: Returns high-level KPI summary metrics such as gross sales, net sales, units sold, and orders.
  endpointPath: /api/analytics/v1/dashboard/summary
  method: POST
  preferredChart: KPI_CARDS
  enabled: true
  inputSchema:
    type: object
    properties:
      tenantId: { type: integer }
      accountIds: { type: array, items: { type: integer } }
      marketplaceCodes: { type: array, items: { type: string } }
      dateRange:
        type: object
        properties:
          startDate: { type: string, format: date }
          endDate: { type: string, format: date }
        required: [startDate, endDate]
      granularity: { type: string, enum: [DAY, WEEK, MONTH] }

- name: get_dashboard_trends
  title: Get Dashboard Trends
  description: Returns trend data over time for key business metrics.
