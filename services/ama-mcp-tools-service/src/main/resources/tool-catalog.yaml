- name: run_flexible_analytics_query
  title: Run Flexible Analytics Query
  description: Executes a flexible analytics query using selected metrics, dimensions, and filters.
  endpointPath: /api/analytics/v1/query
  method: POST
  preferredChart: AUTO
  enabled: true
  inputSchema:
    type: object
    properties:
      tenantId: { type: integer }
      metrics: { type: array, items: { type: string } }
      dimensions: { type: array, items: { type: string } }
      dateRange:
        type: object
        properties:
          startDate: { type: string, format: date }
          endDate: { type: string, format: date }
      filters: { type: object }

